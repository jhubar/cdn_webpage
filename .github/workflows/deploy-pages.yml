# Déploie le site Vite sur GitHub Pages (source : GitHub Actions).
# Réglages repo : Settings → Pages → Build and deployment → Source : GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      # Site projet : https://user.github.io/NOM_DU_REPO/ (ex. cdn_webpage → /cdn_webpage/)
      # Site utilisateur : repo <owner>.github.io → base /
      # Le fallback SPA (404.html) est généré par vite.config.js (plugin comme lanima/web).
      - name: Build (base path GitHub Pages)
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
